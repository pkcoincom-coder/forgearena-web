<style>
  /* =============== DESIGN TOKENS =============== */
  :root{
    --bg-0:#0a0606;
    --bg-1:#120a08;
    --bg-2:#1a0e0a;
    --steel:#2a1a14;
    --steel-2:#3a2418;
    --ember:#ff5a1f;
    --ember-soft:#ff8a3d;
    --gold:#f5c542;
    --gold-deep:#c98b1a;
    --ink:#f6efe2;
    --ink-dim:#b9a892;
    --ok:#3ecf8e;
    --err:#ff4d4d;
    --warn:#ffb84d;
    --r-sm:8px;
    --r:12px;
    --r-lg:18px;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg-0);color:var(--ink);font-family:'Rajdhani',system-ui,sans-serif;min-height:100vh}
  body{
    background:
      radial-gradient(1100px 600px at 50% -10%, rgba(255,90,31,.18), transparent 60%),
      radial-gradient(800px 500px at 100% 110%, rgba(245,197,66,.10), transparent 60%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);
    overflow-x:hidden;
  }
  /* subtle metal grain */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.06;
    background-image:repeating-linear-gradient(45deg, #fff 0 1px, transparent 1px 3px);
    mix-blend-mode:overlay;
  }

  .wrap{position:relative;z-index:2;max-width:560px;margin:0 auto;padding:24px 18px 56px}

  /* =============== TOPBAR =============== */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px}
  .lang-wrap{position:relative}
  .lang-btn{
    background:linear-gradient(180deg,#241511,#15090a);
    border:1px solid #4a2a1c;color:var(--ink);
    padding:8px 12px;border-radius:var(--r-sm);
    font-family:'Rajdhani';font-weight:600;font-size:14px;
    display:flex;align-items:center;gap:6px;cursor:pointer;
  }
  .lang-btn:active{transform:translateY(1px)}
  .lang-menu{
    position:absolute;top:calc(100% + 6px);left:0;
    background:#180c08;border:1px solid #4a2a1c;border-radius:var(--r);
    padding:6px;display:none;flex-direction:column;min-width:170px;z-index:30;
    box-shadow:0 10px 30px rgba(0,0,0,.6);
  }
  .lang-menu.open{display:flex}
  .lang-menu button{
    background:transparent;border:0;color:var(--ink);
    text-align:left;padding:9px 10px;border-radius:6px;
    font-family:'Rajdhani';font-size:14px;cursor:pointer;
  }
  .lang-menu button:hover,.lang-menu button.active{background:#2a1610;color:var(--gold)}

  .sound-btn{
    background:linear-gradient(180deg,#241511,#15090a);
    border:1px solid #4a2a1c;color:var(--ink);
    width:40px;height:40px;border-radius:var(--r-sm);
    font-size:18px;cursor:pointer;display:grid;place-items:center;
  }
  .sound-btn:active{transform:translateY(1px)}

  /* =============== HERO / LOGO =============== */
  .hero{text-align:center;padding:18px 0 8px;position:relative}
  .hero::after{
    content:"";position:absolute;left:50%;bottom:-2px;transform:translateX(-50%);
    width:140px;height:2px;
    background:linear-gradient(90deg,transparent,var(--ember),var(--gold),var(--ember),transparent);
    filter:blur(.3px);
  }

  .logo{
    font-family:'Cinzel',serif;
    line-height:.92;
    letter-spacing:.02em;
    user-select:none;
  }
  /* FIX #1 — FORGE bold + heavy */
  .logo .forge{
    display:block;
    font-weight:900;
    font-size:clamp(44px,12vw,72px);
    color:#f3e7d2;
    text-shadow:
      0 1px 0 #1a0d08,
      0 2px 0 #1a0d08,
      0 3px 0 #1a0d08,
      0 4px 0 #1a0d08,
      0 6px 14px rgba(0,0,0,.55),
      0 0 22px rgba(255,90,31,.18);
    -webkit-text-stroke:1px #2a160e;
  }
  /* FIX #2 — ARENA larger + gold→orange gradient */
  .logo .arena{
    display:block;
    font-weight:900;
    font-size:clamp(58px,16vw,98px);
    margin-top:2px;
    background:linear-gradient(180deg,#ffe27a 0%,#f5c542 35%,#ff8a3d 70%,#c45a17 100%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
    filter:
      drop-shadow(0 2px 0 rgba(0,0,0,.55))
      drop-shadow(0 0 18px rgba(255,138,61,.35));
    -webkit-text-stroke:1px rgba(40,18,8,.6);
  }

  .tagline{
    margin-top:10px;font-family:'Rajdhani';font-weight:600;
    color:var(--ink-dim);letter-spacing:.28em;font-size:12px;text-transform:uppercase;
  }
  .tagline span{color:var(--ember-soft)}

  /* =============== CARD / FORM =============== */
  .card{
    margin-top:22px;background:linear-gradient(180deg,#19100c,#120907);
    border:1px solid #3a2218;border-radius:var(--r-lg);
    padding:20px 18px;position:relative;overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.03);
  }
  .card::before{
    content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:radial-gradient(800px 200px at 50% -20%, rgba(255,90,31,.18), transparent 70%);
  }

  .field{margin-bottom:14px;position:relative;z-index:1}
  .label{
    display:block;font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--ink-dim);font-weight:600;margin-bottom:6px;
  }
  .input{
    width:100%;padding:14px 14px;border-radius:var(--r);
    background:#0e0606;border:1px solid #3a2218;color:var(--ink);
    font-family:'Rajdhani';font-weight:600;font-size:16px;letter-spacing:.04em;
    outline:none;transition:border-color .15s, box-shadow .15s;
  }
  .input:focus{border-color:var(--ember);box-shadow:0 0 0 3px rgba(255,90,31,.15)}
  .input::placeholder{color:#6a5a4a;font-weight:500}

  /* FIX #4 — solid label color, immune to form state changes */
  .btn{
    appearance:none;-webkit-appearance:none;
    width:100%;padding:16px 18px;margin-top:6px;
    border-radius:var(--r);border:1px solid #5a2a14;
    background:linear-gradient(180deg,#ff7a2a 0%,#e54a0e 60%,#a8330a 100%);
    color:#fff8ec !important;            /* solid + !important to defeat any later override */
    font-family:'Cinzel',serif;font-weight:800;
    font-size:16px;letter-spacing:.18em;text-transform:uppercase;
    cursor:pointer;position:relative;overflow:hidden;
    text-shadow:0 1px 0 rgba(0,0,0,.45);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.25),
      inset 0 -2px 0 rgba(0,0,0,.25),
      0 10px 24px rgba(255,90,31,.25);
    transition:transform .08s ease, filter .15s ease;
  }
  .btn:active{transform:translateY(1px);filter:brightness(.95)}
  .btn[disabled]{opacity:.7;cursor:not-allowed}
  .btn .lbl{
    position:relative;z-index:2;
    color:#fff8ec !important;            /* lock label color */
    -webkit-text-fill-color:#fff8ec;     /* defeat any lingering -webkit-text-fill-color */
  }
  .btn::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.18) 50%,transparent 70%);
    transform:translateX(-100%);transition:transform .6s ease;
  }
  .btn:hover::after{transform:translateX(100%)}

  /* =============== RESULT BOXES =============== */
  .result{margin-top:14px;display:flex;flex-direction:column;gap:10px;position:relative;z-index:1}
  .info{
    border-radius:var(--r);padding:12px 14px;
    border:1px solid #3a2218;background:#0e0606;
    display:flex;align-items:flex-start;gap:10px;
  }
  .info.ok{border-color:rgba(62,207,142,.45);background:rgba(62,207,142,.06)}
  .info.err{border-color:rgba(255,77,77,.4);background:rgba(255,77,77,.06)}
  .info .ic{flex:0 0 auto;width:28px;height:28px;border-radius:50%;display:grid;place-items:center;background:#1a0e0a;border:1px solid #3a2218}
  .info.ok .ic{background:rgba(62,207,142,.12);border-color:rgba(62,207,142,.4)}
  .info.err .ic{background:rgba(255,77,77,.12);border-color:rgba(255,77,77,.4)}
  .info h4{margin:0 0 2px 0;font-family:'Cinzel';font-size:14px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink)}
  .info p{margin:0;font-size:14px;color:var(--ink-dim);font-weight:500}
  .info .kv{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:6px}
  .info .kv span{font-size:12px;color:var(--ink-dim)}
  .info .kv b{color:var(--gold);font-weight:700}

  .hidden{display:none !important}

  /* =============== LOADER (FIX #5) =============== */
  /* Always in DOM. Toggle .show. Uses opacity + visibility (no display flicker). */
  .loader{
    position:fixed;inset:0;z-index:9999;display:grid;place-items:center;
    background:radial-gradient(closest-side at 50% 50%, rgba(0,0,0,.65), rgba(0,0,0,.85));
    backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
    opacity:0;visibility:hidden;pointer-events:none;
    transition:opacity .18s ease, visibility .18s ease;
  }
  .loader.show{opacity:1;visibility:visible;pointer-events:auto}
  .loader-inner{position:relative;width:120px;height:120px;display:grid;place-items:center}
  .ring{
    position:absolute;inset:0;border-radius:50%;
    border:3px solid rgba(255,138,61,.18);
    border-top-color:var(--ember);border-right-color:var(--gold);
    animation:spin 1.05s linear infinite;
  }
  .ring.r2{
    inset:14px;border-width:2px;
    border-top-color:var(--gold);border-right-color:transparent;border-bottom-color:var(--ember-soft);
    animation:spin 1.6s linear reverse infinite;
  }
  .sword{
    font-size:38px;line-height:1;filter:drop-shadow(0 0 10px rgba(255,138,61,.55));
    animation:pulse 1.2s ease-in-out infinite;
  }
  .loader-text{
    position:absolute;top:calc(50% + 80px);left:50%;transform:translateX(-50%);
    font-family:'Cinzel';font-weight:700;font-size:13px;letter-spacing:.32em;
    color:var(--gold);text-transform:uppercase;white-space:nowrap;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

  /* =============== FOOTER =============== */
  .foot{margin-top:22px;text-align:center;font-size:12px;color:#6a5a4a;letter-spacing:.18em}
  .foot b{color:var(--gold-deep)}
</style>

</head>

  "fr":{tagline:["FORGEZ VOTRE","LÉGENDE"], lbPlayer:"Tag du Joueur", lbClan:"Tag du Clan", btn:"VÉRIFIER & ENTRER", forging:"FORGE EN COURS…", okPlayer:"Joueur vérifié", okClan:"Clan vérifié", okLeader:"Vous êtes le Chef du Clan ✓", errPlayer:"Tag du joueur introuvable", errClan:"Tag du clan introuvable", errLeader:"Vous n'êtes pas le Chef (Chef requis)", errNet:"Erreur réseau, réessayez", errEmpty:"Saisissez les deux tags", th:"FORGÉ EN THAÏLANDE"},
  "ru":{tagline:["КУЙТЕ СВОЮ","ЛЕГЕНДУ"], lbPlayer:"Тег игрока", lbClan:"Тег клана", btn:"ПРОВЕРИТЬ И ВОЙТИ", forging:"КОВКА…", okPlayer:"Игрок подтверждён", okClan:"Клан подтверждён", okLeader:"Вы лидер клана ✓", errPlayer:"Тег игрока не найден", errClan:"Тег клана не найден", errLeader:"Вы не лидер (только лидер)", errNet:"Сетевая ошибка, повторите", errEmpty:"Введите оба тега", th:"ВЫКОВАНО В ТАИЛАНДЕ"}
};

/* ---------- 2. State ---------- */
const state = {
  lang: localStorage.getItem("fa_lang") || "th",
  sound: localStorage.getItem("fa_sound") !== "0"
};

/* ---------- 3. DOM refs ---------- */
const $ = id => document.getElementById(id);
const elLangBtn  = $("langBtn"), elLangMenu = $("langMenu"),
      elFlag = $("langFlag"), elLangLabel = $("langLabel"),
      elSoundBtn = $("soundBtn"),
      elTagline = $("tagline"),
      elLbPlayer = $("lbPlayer"), elLbClan = $("lbClan"),
      elBtn = $("verifyBtn"), elBtnLabel = $("btnLabel"),
      elPlayer = $("playerTag"), elClan = $("clanTag"),
      elResult = $("result"),
      elLoader = $("loader"), elLoaderText = $("loaderText"),
      elFt = $("ftLine");

/* ---------- 4. i18n apply ---------- */
function applyLang(){
  const t = I18N[state.lang] || I18N.en;
  elTagline.innerHTML = `${t.tagline[0]} <span>${t.tagline[1]}</span>`;
  elLbPlayer.textContent = t.lbPlayer;
  elLbClan.textContent   = t.lbClan;
  elBtnLabel.textContent = t.btn;
  elFt.textContent       = t.th;
  const meta = LANGS.find(l=>l.code===state.lang) || LANGS[0];
  elFlag.textContent = meta.flag;
  elLangLabel.textContent = meta.name;
  document.documentElement.lang = state.lang;
}

/* ---------- 5. Lang menu ---------- */
function buildLangMenu(){
  elLangMenu.innerHTML = "";
  LANGS.forEach(l=>{
    const b = document.createElement("button");
    b.type = "button"; b.dataset.code = l.code;
    b.innerHTML = `${l.flag}&nbsp;&nbsp;${l.name}`;
    if(l.code===state.lang) b.classList.add("active");
    b.addEventListener("click", ()=>{
      state.lang = l.code; localStorage.setItem("fa_lang", l.code);
      buildLangMenu(); applyLang(); closeLangMenu(); playSound("click");
    });
    elLangMenu.appendChild(b);
  });
}
function openLangMenu(){ elLangMenu.classList.add("open"); elLangBtn.setAttribute("aria-expanded","true"); }
function closeLangMenu(){ elLangMenu.classList.remove("open"); elLangBtn.setAttribute("aria-expanded","false"); }
elLangBtn.addEventListener("click",(e)=>{
  e.stopPropagation();
  elLangMenu.classList.contains("open") ? closeLangMenu() : openLangMenu();
  playSound("click");
});
document.addEventListener("click",(e)=>{ if(!elLangMenu.contains(e.target) && e.target!==elLangBtn) closeLangMenu(); });

/* ---------- 6. Sound (Web Audio API) ---------- */
let AC = null;
function ac(){
  if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ AC=null; } }
  // iOS unlock
  if(AC && AC.state==="suspended") AC.resume().catch(()=>{});
  return AC;
}
function tone(freq, dur=0.12, type="triangle", gain=0.06, slideTo=null){
  if(!state.sound) return;
  const a = ac(); if(!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type; o.frequency.value = freq;
  if(slideTo!=null) o.frequency.exponentialRampToValueAtTime(slideTo, a.currentTime+dur);
  g.gain.value = gain;
  g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime+dur);
  o.connect(g).connect(a.destination);
  o.start(); o.stop(a.currentTime + dur + 0.02);
}
function playSound(kind){
  switch(kind){
    case "click":   tone(620, .07, "square",   .05); break;
    case "success": tone(660, .09, "triangle", .07); setTimeout(()=>tone(990,.16,"triangle",.06),90); break;
    case "error":   tone(220, .16, "sawtooth", .07, 110); break;
    case "verify":  tone(440, .08, "triangle", .05, 660); break;
  }
}
function syncSoundIcon(){ elSoundBtn.textContent = state.sound ? "🔊" : "🔇"; }
elSoundBtn.addEventListener("click", ()=>{
  state.sound = !state.sound;
  localStorage.setItem("fa_sound", state.sound ? "1" : "0");
  syncSoundIcon();
  if(state.sound) playSound("click");
});

/* ---------- 7. Loader (FIX #5) ---------- */
function showLoader(label){
  if(label) elLoaderText.textContent = label;
  // Force a paint frame so transition reliably runs (was the source of "spinner not showing").
  requestAnimationFrame(()=> requestAnimationFrame(()=>{
    elLoader.classList.add("show");
    elLoader.setAttribute("aria-hidden","false");
  }));
}
function hideLoader(){
  elLoader.classList.remove("show");
  elLoader.setAttribute("aria-hidden","true");
}

/* ---------- 8. Helpers ---------- */
function normTag(s){
  if(!s) return "";
  s = s.trim().toUpperCase().replace(/\s+/g,"");
  if(!s.startsWith("#")) s = "#"+s;
  // CoC tags use 0289PYLQGRJCUV; replace common confusables
  s = s.replace(/O/g,"0").replace(/I/g,"1");
  return s;
}
function escapeHtml(s){ return String(s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function renderResult(items){
  elResult.innerHTML = items.map(it=>{
    const cls = it.ok===true ? "ok" : it.ok===false ? "err" : "";
    const ic  = it.ok===true ? "✓"  : it.ok===false ? "✕" : "•";
    const kv  = it.kv ? `<div class="kv">${it.kv.map(k=>`<span>${escapeHtml(k.k)}: <b>${escapeHtml(k.v)}</b></span>`).join("")}</div>` : "";
    return `<div class="info ${cls}">
      <div class="ic">${ic}</div>
      <div>
        <h4>${escapeHtml(it.title)}</h4>
        <p>${escapeHtml(it.text||"")}</p>
        ${kv}
      </div>
    </div>`;
  }).join("");
}

/* ---------- 9. Verify flow ---------- */
async function verify(){
  const t = I18N[state.lang] || I18N.en;
  const playerTag = normTag(elPlayer.value);
  const clanTag   = normTag(elClan.value);

  // Always try to play a click — also unlocks iOS audio for later sounds
  playSound("click");

  if(!playerTag || playerTag==="#" || !clanTag || clanTag==="#"){
    renderResult([{ok:false, title:"⚠️", text:t.errEmpty}]);
    playSound("error");
    return;
  }

  // Reflect normalized values back to the user
  elPlayer.value = playerTag;
  elClan.value   = clanTag;

  elBtn.disabled = true;
  showLoader(t.forging);
  playSound("verify");

  try{
    const res = await fetch(VERIFY_FN, {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+SUPABASE_ANON,
        "apikey": SUPABASE_ANON
      },
      body: JSON.stringify({ playerTag, clanTag })
    });

    let data = {};
    try { data = await res.json(); } catch(_){}

    /* Expected edge-function response shape:
       {
         player:{ok, name, tag, townHallLevel, trophies},
         clan:  {ok, name, tag, members, level},
         leader:{ok}    // strict leader-only
       }
       (If your verify-coc returns a different shape, only this block needs to change.) */

    const items = [];

    // Player
    if(data?.player?.ok){
      items.push({
        ok:true, title: t.okPlayer,
        text: data.player.name || playerTag,
        kv: [
          {k:"Tag", v: data.player.tag || playerTag},
          data.player.townHallLevel ? {k:"TH", v: data.player.townHallLevel} : null,
          data.player.trophies      ? {k:"🏆", v: data.player.trophies}      : null
        ].filter(Boolean)
      });
    } else {
      items.push({ok:false, title:t.errPlayer, text: playerTag});
    }

    // Clan
    if(data?.clan?.ok){
      items.push({
        ok:true, title: t.okClan,
        text: data.clan.name || clanTag,
        kv: [
          {k:"Tag", v: data.clan.tag || clanTag},
          data.clan.level   ? {k:"Lv",  v: data.clan.level}   : null,
          data.clan.members ? {k:"👥",  v: data.clan.members} : null
        ].filter(Boolean)
      });
    } else {
      items.push({ok:false, title:t.errClan, text: clanTag});
    }

    // Leader (strict)
    if(data?.leader?.ok){
      items.push({ok:true, title:t.okLeader, text:""});
    } else {
      items.push({ok:false, title:t.errLeader, text:""});
    }

    renderResult(items);

    const allOk = data?.player?.ok && data?.clan?.ok && data?.leader?.ok;
    playSound(allOk ? "success" : "error");

  }catch(err){
    renderResult([{ok:false, title:"⚠️", text:t.errNet}]);
    playSound("error");
  }finally{
    hideLoader();
    elBtn.disabled = false;
  }
}

/* FIX #3 — bind sound + handler to the verify button */
elBtn.addEventListener("click", verify);
[elPlayer, elClan].forEach(inp=>{
  inp.addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); verify(); }});
});

/* ---------- 10. Boot ---------- */
buildLangMenu();
applyLang();
syncSoundIcon();

/* iOS: unlock audio on first user gesture, anywhere */
["touchstart","click"].forEach(ev=>{
  window.addEventListener(ev, ()=>{ ac(); }, {once:true, passive:true});
});
</script>
