<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OTP Test</title>
<style>
body{background:#0a0a0a;color:#fff;font-family:Arial;padding:20px;}
input{width:100%;padding:12px;background:#000;color:#fff;border:1px solid #444;margin:8px 0;font-size:16px;}
button{width:100%;padding:14px;background:#FF6600;color:#fff;border:none;font-size:16px;font-weight:700;margin:8px 0;cursor:pointer;}
.result{background:#000;padding:12px;margin:8px 0;font-family:monospace;font-size:12px;white-space:pre-wrap;color:#0f0;min-height:60px;}
.error{color:#f55;}
h2{color:#FFD700;}
</style>
</head>
<body>
<h2>🔧 OTP Function Test</h2>

<p>Email:</p>
<input type="email" id="email" value="pksmile7@gmail.com">

<button onclick="testSendOTP()">TEST SEND OTP</button>

<div class="result" id="sendResult">Result will appear here...</div>

<hr style="border-color:#333;margin:20px 0">

<p>OTP Code:</p>
<input type="text" id="otpCode" placeholder="Enter 6-digit code from email" maxlength="6">

<button onclick="testVerifyOTP()">TEST VERIFY OTP</button>

<div class="result" id="verifyResult">Result will appear here...</div>

<script>
const BASE = 'https://dfbrqporbfiaaejeofmr.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmYnJxcG9yYmZpYWFlamVvZm1yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxOTk2MDksImV4cCI6MjA5Mjc3NTYwOX0.lTGzd69csS0BiMbjYDCDVqB4ANcCWrzgZKdSHgBDFuc';

async function testSendOTP() {
  const el = document.getElementById('sendResult');
  el.className = 'result';
  el.textContent = '⏳ Calling send-otp...';
  const email = document.getElementById('email').value;
  try {
    const res = await fetch(`${BASE}/functions/v1/send-otp`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${KEY}`,
        'apikey': KEY,
      },
      body: JSON.stringify({ email }),
    });
    const data = await res.json();
    el.textContent = `Status: ${res.status}\n\n${JSON.stringify(data, null, 2)}`;
    if (!data.success) el.className = 'result error';
  } catch (err) {
    el.className = 'result error';
    el.textContent = 'ERROR: ' + err.message;
  }
}

async function testVerifyOTP() {
  const el = document.getElementById('verifyResult');
  el.className = 'result';
  el.textContent = '⏳ Calling verify-otp...';
  const email = document.getElementById('email').value;
  const code = document.getElementById('otpCode').value;
  try {
    const res = await fetch(`${BASE}/functions/v1/verify-otp`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${KEY}`,
        'apikey': KEY,
      },
      body: JSON.stringify({ email, code }),
    });
    const data = await res.json();
    el.textContent = `Status: ${res.status}\n\n${JSON.stringify(data, null, 2)}`;
    if (!data.success) el.className = 'result error';
  } catch (err) {
    el.className = 'result error';
    el.textContent = 'ERROR: ' + err.message;
  }
}
</script>

</body>
</html>
