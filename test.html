<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoC API Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif;}
body{background:#0a0a0a;color:#fff;padding:20px;min-height:100vh;}
h1{font-size:20px;margin-bottom:20px;color:#ff6600;}
.section{background:#1a1a1a;padding:16px;margin-bottom:16px;border-radius:8px;border:1px solid #333;}
label{display:block;font-size:12px;color:#888;margin-bottom:4px;}
input{width:100%;padding:12px;background:#000;color:#fff;border:1px solid #444;border-radius:4px;font-size:14px;font-family:monospace;}
button{width:100%;padding:14px;background:#ff6600;color:#fff;border:none;border-radius:4px;font-size:16px;font-weight:700;margin-top:10px;cursor:pointer;}
button:disabled{opacity:.5;}
.result{background:#000;padding:12px;margin-top:12px;border-radius:4px;font-family:monospace;font-size:11px;white-space:pre-wrap;word-break:break-all;color:#0f0;max-height:400px;overflow-y:auto;}
.result.error{color:#f55;}
</style>
</head>
<body>

<h1>🔧 CoC API Test Tool</h1>

<div class="section">
  <label>SUPABASE URL</label>
  <input id="supaUrl" value="https://dfbrqporbfiaaejeofmr.supabase.co">
</div>

<div class="section">
  <label>SUPABASE ANON KEY</label>
  <input id="supaKey" value="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmYnJxcG9yYmZpYWFlamVvZm1yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxOTk2MDksImV4cCI6MjA5Mjc3NTYwOX0.lTGzd69csS0BiMbjYDCDVqB4ANcCWrzgZKdSHgBDFuc">
</div>

<div class="section">
  <label>TEST 1: Verify Player</label>
  <input id="playerTag" value="#8G80JQVQ" placeholder="#XXXXXXXXX">
  <button onclick="testPlayer()">Test Player Verify</button>
  <div id="playerResult" class="result"></div>
</div>

<div class="section">
  <label>TEST 2: Verify Clan</label>
  <input id="clanTag" value="#8C8LVVJ" placeholder="#XXXXXXXXX">
  <button onclick="testClan()">Test Clan Verify</button>
  <div id="clanResult" class="result"></div>
</div>

<div class="section">
  <label>TEST 3: Verify Leader</label>
  <button onclick="testLeader()">Test Leader Verify (uses both tags above)</button>
  <div id="leaderResult" class="result"></div>
</div>

<script>
async function callAPI(action, body) {
  const url = document.getElementById('supaUrl').value + '/functions/v1/verify-coc';
  const key = document.getElementById('supaKey').value;

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + key,
        'apikey': key,
      },
      body: JSON.stringify(body),
    });
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch { data = text; }
    return { status: res.status, data };
  } catch (err) {
    return { status: 0, error: err.message };
  }
}

async function testPlayer() {
  const el = document.getElementById('playerResult');
  el.className = 'result';
  el.textContent = '⏳ Testing...';

  const tag = document.getElementById('playerTag').value;
  const result = await callAPI('verifyPlayer', { action: 'verifyPlayer', playerTag: tag });

  el.className = 'result ' + (result.status === 200 ? '' : 'error');
  el.textContent = 'Status: ' + result.status + '\n\n' + JSON.stringify(result.data || result.error, null, 2);
}

async function testClan() {
  const el = document.getElementById('clanResult');
  el.className = 'result';
  el.textContent = '⏳ Testing...';

  const tag = document.getElementById('clanTag').value;
  const result = await callAPI('verifyClan', { action: 'verifyClan', clanTag: tag });

  el.className = 'result ' + (result.status === 200 ? '' : 'error');
  el.textContent = 'Status: ' + result.status + '\n\n' + JSON.stringify(result.data || result.error, null, 2);
}

async function testLeader() {
  const el = document.getElementById('leaderResult');
  el.className = 'result';
  el.textContent = '⏳ Testing...';

  const playerTag = document.getElementById('playerTag').value;
  const clanTag = document.getElementById('clanTag').value;
  const result = await callAPI('verifyLeader', { action: 'verifyLeader', playerTag, clanTag });

  el.className = 'result ' + (result.status === 200 ? '' : 'error');
  el.textContent = 'Status: ' + result.status + '\n\n' + JSON.stringify(result.data || result.error, null, 2);
}
</script>

</body>
</html>
